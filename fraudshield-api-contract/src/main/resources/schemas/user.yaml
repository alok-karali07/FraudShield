UserRequest:
  type: object
  required:
    - firstName
    - lastName
    - email
    - phone
  properties:
    firstName:
      type: string
      minLength: 2
      maxLength: 50
    lastName:
      type: string
      minLength: 2
      maxLength: 50
    email:
      type: string
      format: email
    phone:
      type: string
      pattern: '^\+?[1-9]\d{9,14}$'

UserResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    firstName:
      type: string
    lastName:
      type: string
    email:
      type: string
    phone:
      type: string
    createdAt:
      type: string
      format: date-time