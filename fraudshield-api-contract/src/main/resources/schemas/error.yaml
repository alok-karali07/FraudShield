ErrorResponse:
  type: object
  properties:
    code:
      $ref: '#/ErrorCode'
    message:
      type: string
    timestamp:
      type: integer
      format: int64
    stackTrace:
      type: string

ErrorCode:
  type: string
  enum:
    - INVALID_REQUEST
    - DUPLICATE_TRANSACTION
    - VALIDATION_FAILED
    - SYSTEM_ERROR
    - UNAUTHORIZED
    - SERVICE_UNAVAILABLE