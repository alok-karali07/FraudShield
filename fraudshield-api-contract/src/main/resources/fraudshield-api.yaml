openapi: 3.0.3
info:
  title: FraudShield Transaction API
  description: API for submitting transactions for fraud analysis
  version: 1.0.0

servers:
  - url: http://localhost:8081

tags:
  - name: Transaction
    description: Transaction management
  - name: User
    description: User management

paths:
  /api/v1/transactions:
    post:
      tags:
        - Transaction
      summary: Create a new transaction
      description: Accepts a transaction and publishes it for asynchronous fraud processing
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/fraudshield.yaml#/TransactionRequest'
      responses:
        202:
          description: Transaction accepted for processing
          content:
            application/json:
              schema:
                $ref: './schemas/fraudshield.yaml#/TransactionResponse'
        400:
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: './schemas/error.yaml#/ErrorResponse'
        409:
          description: Duplicate transaction
          content:
            application/json:
              schema:
                $ref: './schemas/error.yaml#/ErrorResponse'

  /api/v1/users:
    post:
      tags:
        - User
      summary: Create a new user
      description: Registers a new user in the FraudShield system
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/user.yaml#/UserRequest'
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: './schemas/user.yaml#/UserResponse'
        400:
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: './schemas/error.yaml#/ErrorResponse'
        409:
          description: User already exists
          content:
            application/json:
              schema:
                $ref: './schemas/error.yaml#/ErrorResponse'

  /api/v1/users/{id}:
    get:
      tags:
        - User
      summary: Get user by ID
      description: Retrieves user details by their ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: User found
          content:
            application/json:
              schema:
                $ref: './schemas/user.yaml#/UserResponse'
        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: './schemas/error.yaml#/ErrorResponse'