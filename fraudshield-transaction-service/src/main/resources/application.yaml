spring:
  application:
    name: fraudshield-transaction-service

  datasource:
    url: jdbc:postgresql://localhost:5432/fraudshield
    username: user
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html